<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELYSIUM — O'quv Platformasi</title>
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* ─── TOKENS & RESET ────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --white:   #ffffff;
      --off:     #f7f7f5;
      --light:   #efefed;
      --mid:     #c8c8c4;
      --muted:   #8c8c88;
      --ink:     #1a1a18;
      --line:    #e2e2de;
      --sidebar: 260px;
      --hdr:     72px;
      --radius:  14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── LOGIN & REGISTER SCREEN ───────────────────────────── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }

    .login-card {
      width: 100%; max-width: 420px;
      padding: 56px 48px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 8px 60px rgba(0,0,0,.08);
      animation: fadeUp .6s ease both;
    }

    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 300;
      letter-spacing: .18em; text-align: center; margin-bottom: 40px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 13px 16px; border: 1px solid var(--line);
      border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; background: var(--off); outline: none;
    }

    .btn-primary {
      width: 100%; padding: 14px; background: var(--ink); color: var(--white);
      border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
      cursor: pointer; margin-top: 10px;
    }
    .btn-outline {
      width: 100%; padding: 12px; background: none; color: var(--muted);
      border: 1px solid var(--line); border-radius: 10px; font-size: 13px;
      cursor: pointer; margin-top: 12px; transition: .2s;
    }
    .btn-outline:hover { color: var(--ink); border-color: var(--ink); }

    /* ─── APP SHELL ─────────────────────────────────────────── */
    #app { display: none; }
    #app.visible { display: flex; }

    .sidebar {
      width: var(--sidebar); height: 100vh; position: fixed; top: 0; left: 0;
      background: var(--white); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; z-index: 100;
    }
    .sidebar-brand { padding: 28px; border-bottom: 1px solid var(--line); }
    .sidebar-brand-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; letter-spacing: .2em; }
    
    .nav-links { padding: 24px 16px; flex: 1; }
    .nav-item { padding: 11px 12px; border-radius: 10px; font-size: 14px; margin-bottom: 4px; cursor: pointer; }
    .nav-item.active { background: var(--ink); color: var(--white); }
    .nav-item.logout { color: #e74c3c; margin-top: auto; border: 1px solid #f8d7da; text-align: center; }

    .main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .header { height: var(--hdr); background: var(--white); border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 40px; position: sticky; top: 0; }
    .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; letter-spacing: .3em; flex: 1; text-align: center; }

    .content { flex: 1; padding: 40px; max-width: 900px; width: 100%; margin: 0 auto; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 8px; }
    
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 32px; margin-bottom: 40px; }
    .stat-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 40px; line-height: 1; }

    .submit-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); padding: 32px; }
    .submit-textarea { width: 100%; min-height: 120px; padding: 16px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 12px; font-family: inherit; resize: none; outline: none; }
    .link-input { width: 100%; padding: 12px 16px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 16px; outline: none; }
    .btn-send { padding: 12px 24px; background: var(--ink); color: var(--white); border: none; border-radius: 10px; font-weight: 500; cursor: pointer; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">ELYSIUM</div>
    
    <div class="form-group">
      <label>Foydalanuvchi ID</label>
      <input type="text" id="user-id" placeholder="Masalan: ELY-2026" />
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" id="user-pass" placeholder="••••••••" />
    </div>
    
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Kirish</button>
    <button class="btn-outline" id="register-btn" onclick="handleRegister()">Ro'yxatdan o'tish</button>
    
    <p id="auth-msg" style="font-size: 12px; text-align: center; margin-top: 15px; color: var(--muted);"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-name">ELYSIUM</div></div>
    <nav class="nav-links">
      <div class="nav-item active">Asosiy Dashboard</div>
      <div class="nav-item">Kurslar</div>
      <div class="nav-item">Vazifalar</div>
      <div style="margin-top: 250px;"></div>
      <div class="nav-item logout" onclick="handleLogout()">Chiqish</div>
    </nav>
  </aside>

  <main class="main">
    <header class="header"><div class="header-logo">ELYSIUM</div></header>
    <div class="content">
      <div class="page-title" id="display-name">Xush kelibsiz</div>
      <p style="color: var(--muted); font-size: 14px;">Bugun: 4-May, 2026-yil</p>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-value">12</div><div style="font-size:11px; color:var(--muted)">Bajarilgan</div></div>
        <div class="stat-card"><div class="stat-value">3</div><div style="font-size:11px; color:var(--muted)">Loyihalar</div></div>
        <div class="stat-card"><div class="stat-value">840</div><div style="font-size:11px; color:var(--muted)">Ball</div></div>
      </div>

      <div class="submit-card">
        <h4 style="margin-bottom: 20px;">Topshiriq yuborish</h4>
        <form action="https://formspree.io/f/xwvylorz" method="POST">
          <textarea class="submit-textarea" name="message" placeholder="Topshiriq haqida qisqacha..." required></textarea>
          <input class="link-input" type="url" name="github" placeholder="GitHub havolasi (https://github.com/...)" required />
          <div style="display:flex; justify-content:flex-end;">
            <button type="submit" class="btn-send">Yuborish</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
  // SUPABASE KONFIGURATSIYASI
  const SUPABASE_URL = 'https://bdxdrksfryspuialotxp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_3hE_8DuG-0xjYabNdH6qOA_d195zZB9'; 
  const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 1. SAHIFA YUKLANGANDA TEKSHIRISH (Eslab qolish qismi)
  window.onload = () => {
    const session = localStorage.getItem('elysium_session');
    if (session) {
      const user = JSON.parse(session);
      showApp(user.student_id);
    }
  };

  // 2. KIRISH FUNKSIYASI
  async function handleLogin() {
    const id = document.getElementById('user-id').value;
    const pass = document.getElementById('user-pass').value;
    const btn = document.getElementById('login-btn');

    if (!id || !pass) return alert("Barcha maydonlarni to'ldiring!");

    btn.disabled = true;
    btn.textContent = "Tekshirilmoqda...";

    const { data, error } = await _client
      .from('students')
      .select('*')
      .eq('student_id', id)
      .eq('password', pass)
      .single();

    if (data) {
      localStorage.setItem('elysium_session', JSON.stringify(data));
      showApp(data.student_id);
    } else {
      alert("ID yoki parol xato!");
      btn.disabled = false;
      btn.textContent = "Kirish";
    }
  }

  // 3. RO'YXATDAN O'TISH FUNKSIYASI
  async function handleRegister() {
    const id = document.getElementById('user-id').value;
    const pass = document.getElementById('user-pass').value;
    const msg = document.getElementById('auth-msg');

    if (id.length < 3 || pass.length < 4) {
      return alert("ID kamida 3 ta, parol kamida 4 ta belgi bo'lsin!");
    }

    msg.textContent = "Ro'yxatga olinmoqda...";

    const { error } = await _client
      .from('students')
      .insert([{ student_id: id, password: pass }]);

    if (error) {
      alert("Xatolik! Balki bu ID banddir?");
      msg.textContent = "";
    } else {
      alert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Endi 'Kirish' tugmasini bosing.");
      msg.textContent = "Tayyor! Kirishingiz mumkin.";
    }
  }

  // 4. ILOVANI KO'RSATISH
  function showApp(name) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('display-name').textContent = `Xush kelibsiz, ${name}!`;
  }

  // 5. CHIQISH (LOGOUT)
  function handleLogout() {
    localStorage.removeItem('elysium_session');
    location.reload();
  }
</script>

</body>
</html>
