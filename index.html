<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Elysium - Professional Register</title>
  <style>
    :root {
      --bg: #f8f9fc;
      --glass: rgba(255, 255, 255, 0.85);
      --ink: #1e293b;
      --muted: #64748b;
      --accent: #0f172a;
      --error: #ef4444;
      --success: #10b981;
      --border: rgba(226, 232, 240, 0.8);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      overflow: hidden; /* Mobil qotishini oldini oladi */
    }

    /* Ro'yxatdan o'tish kartasi */
    .reg-card {
      width: 100%; max-width: 400px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      margin: 16px;
      transition: all 0.3s ease;
    }

    /* Mobil uchun moslashuv */
    @media (max-width: 480px) {
      body { align-items: flex-end; } /* Pastdan chiquvchi oyna effekti */
      .reg-card { 
        margin: 0; 
        border-radius: 24px 24px 0 0; 
        max-height: 90vh; 
        overflow-y: auto; 
      }
    }

    h2 { font-size: 24px; color: var(--accent); margin-bottom: 8px; text-align: center; }
    p.subtitle { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; position: relative; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

    input {
      width: 100%; padding: 14px 16px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px; color: var(--ink);
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05); }

    /* Tasdiqlash kodi qismi (Yashirin) */
    #otp-section {
      display: none;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px dashed var(--border);
      animation: slideDown 0.4s ease forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .otp-container { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
    .otp-input {
      width: 45px; height: 50px;
      text-align: center; font-size: 20px; font-weight: 700;
      border-radius: 10px; border: 1px solid var(--border);
    }

    .btn-main {
      width: 100%; padding: 14px;
      background: var(--accent); color: white;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 12px;
      transition: transform 0.1s, opacity 0.2s;
    }

    .btn-main:active { transform: scale(0.98); }
    .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-type-tag {
      position: absolute; right: 12px; top: 38px;
      font-size: 10px; font-weight: 700;
      background: #e2e8f0; padding: 2px 6px; border-radius: 4px;
      color: var(--muted); text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="reg-card">
  <h2>Ro'yxatdan o'tish</h2>
  <p class="subtitle">Elysium o'quv platformasiga xush kelibsiz</p>

  <div class="form-group">
    <label>Ism va Familiya</label>
    <input type="text" id="fullname" placeholder="Alisher Murodov">
  </div>

  <div class="form-group">
    <label>Telefon raqam yoki Email</label>
    <input type="text" id="contact" placeholder="Email yoki tel raqam" oninput="handleContactInput(this)">
    <span id="type-tag" class="input-type-tag" style="display:none">Email</span>
  </div>

  <button class="btn-main" id="send-code-btn" onclick="sendCode()">Kodni yuborish</button>

  <!-- OTP SECTION -->
  <div id="otp-section">
    <label>Tasdiqlash kodi</label>
    <div class="otp-container">
      <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, 0)">
      <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, 1)">
      <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, 2)">
      <input type="text" maxlength="1" class="otp-input" onkeyup="moveNext(this, 3)">
    </div>
    <button class="btn-main" style="margin-top: 20px;" onclick="finishReg()">Tasdiqlash va Kirish</button>
  </div>
</div>

<script>
  // Telefon raqam maskasi va aniqlash mantiqi
  function handleContactInput(el) {
    let val = el.value;
    const tag = document.getElementById('type-tag');
    
    // Agar raqam bilan boshlansa (8, 9, +)
    if (/^[0-9+]/.test(val)) {
      tag.style.display = 'block';
      tag.innerText = 'TEL';
      
      // Avtomatik +998 prefiksi
      if (val.length === 1 && (val === '9' || val === '8' || val === '3')) {
        el.value = '+998 ';
      }
      
      // Oddiy maskalash (format: +998 (XX) XXX-XX-XX)
      let x = el.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
      el.value = !x[2] ? '+' + x[1] : '+' + x[1] + ' (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
    } 
    // Agar harf bo'lsa (Email)
    else if (val.length > 0) {
      tag.style.display = 'block';
      tag.innerText = 'EMAIL';
    } else {
      tag.style.display = 'none';
    }
  }

  function sendCode() {
    const name = document.getElementById('fullname').value;
    const contact = document.getElementById('contact').value;

    if (name.length < 3 || contact.length < 5) {
      alert("Iltimos, barcha maydonlarni to'ldiring");
      return;
    }

    document.getElementById('send-code-btn').innerText = "Kod yuborildi";
    document.getElementById('send-code-btn').disabled = true;
    document.getElementById('otp-section').style.display = 'block';
  }

  // OTP inputlar o'rtasida avtomatik o'tish
  function moveNext(el, index) {
    const inputs = document.querySelectorAll('.otp-input');
    if (el.value.length === 1 && index < 3) {
      inputs[index + 1].focus();
    }
  }

  function finishReg() {
    alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
    window.location.reload(); 
  }
</script>

</body>
</html>
